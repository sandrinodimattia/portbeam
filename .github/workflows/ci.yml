name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -count=1 ./...

      - name: Race test
        run: go test -race -count=1 ./...

      - name: Coverage
        run: |
          go test -count=1 -coverprofile=coverage.out ./...
          total="$(go tool cover -func=coverage.out | awk '/^total:/ { print $3 }')"
          if [ "$total" != "100.0%" ]; then
            echo "coverage $total, want 100.0%"
            exit 1
          fi

      - name: Build
        run: go build -trimpath -o "$RUNNER_TEMP/portbeam" ./cmd/portbeam
