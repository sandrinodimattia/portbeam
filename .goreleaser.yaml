version: 2

project_name: portbeam

release:
  github:
    owner: sandrinodimattia
    name: portbeam

before:
  hooks:
    - go mod tidy

builds:
  - id: portbeam
    main: ./cmd/portbeam
    binary: portbeam
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: portbeam
    ids:
      - portbeam
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
